# H4 high-shot eval variant — 2000 eval shadows for better SNR on k=1 Majorana ops
# Shadow coefficient for k=1 on 8 qubits: binom(16,2)/binom(8,1) = 15
# At 2000 shots: std per entry ≈ 15/sqrt(2000) ≈ 0.34 (vs 0.67 at 500)
# Training data identical to h4.yaml (50 shadows for generative model)
data:
  n_atoms: 4
  r_start: 0.5
  r_end: 3.0
  r_step: 0.05
  n_times: 2500
  t_max: 500.0
  n_shadows: 50
  observable_locality: 3
  n_test_geom: 10
  seed: 42

spectroscopy:
  ljung_box_p_threshold: 0.06
  n_eigenvectors: 5

model:
  d_model: 128
  n_layers: 4
  n_heads: 4
  d_ff: 512
  dropout: 0.1
  hidden_dim: 128
  inject_every_layer: true

training:
  iterations: 50000
  batch_size: 256
  lr: 1.0e-3
  final_lr: 1.0e-7
  warmup_frac: 0.05
  weight_decay: 1.0e-4
  smoothing: 0.1
  eval_every: 2000

eval:
  n_eval_shadows: 2000
