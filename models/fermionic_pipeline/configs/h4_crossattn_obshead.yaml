# H4 cross-attention + observable head loss (2x2 experiment: architecture × aux loss)
data:
  n_atoms: 4
  r_start: 0.5
  r_end: 3.0
  r_step: 0.05
  n_times: 2500
  t_max: 500.0
  n_shadows: 200
  observable_locality: 3
  n_test_geom: 10
  seed: 42

spectroscopy:
  ljung_box_p_threshold: 0.06
  n_eigenvectors: 5

model:
  architecture: crossattn
  d_model: 128
  n_layers: 4
  n_heads: 4
  d_ff: 512
  dropout: 0.1
  hidden_dim: 128

training:
  iterations: 50000
  batch_size: 256
  lr: 1.0e-3
  final_lr: 1.0e-7
  warmup_frac: 0.05
  weight_decay: 1.0e-4
  smoothing: 0.1
  eval_every: 2000
  aux_loss: observable_head
  aux_weight: 0.1

eval:
  n_eval_shadows: 500
