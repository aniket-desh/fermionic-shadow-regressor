# H4 with Fourier time embedding + observable expectation loss
# H4 has 256 bitstrings — enumerate every 4 steps to manage cost
data:
  n_atoms: 4
  r_start: 0.5
  r_end: 3.0
  r_step: 0.5              # 6 geometries (fast test)
  t_max: 10.0
  n_times: 10
  n_shadows: 100
  n_test_geom: 2
  seed: 42

model:
  d_model: 128
  n_layers: 4
  n_heads: 4
  d_ff: 512
  dropout: 0.1
  hidden_dim: 128
  inject_every_layer: true
  time_embedding: fourier
  n_freq: 64
  max_freq: 2.0
  param_range: [0.5, 3.0]

training:
  iterations: 10000
  batch_size: 128          # smaller — enumerate_distribution uses batch*256 memory
  lr: 1.0e-3
  final_lr: 1.0e-7
  warmup_frac: 0.05
  weight_decay: 0.0
  smoothing: 0.0
  eval_every: 1000
  aux_loss: observable_expectation
  aux_weight: 1.0
  obs_loss_every: 4        # enumerate 256 bitstrings every 4 steps

eval:
  n_eval_shadows: 500
